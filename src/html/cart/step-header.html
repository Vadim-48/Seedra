<div class="{{className}} step-header">
    <div class="step-header__inner">
        <a
          href="{{href}}"
          class="step-header__btn-return">
            {{> components/svg
            className="step-header__btn-return-icon"
            id="arrow-return"
            }}
        </a>
        <h1 class="step-header__title title">{{title}}</h1>
    </div>
    <div class="step-header__page">
        <div class="step-header__page-item"></div>
        <div class="step-header__page-item"></div>
    </div>
</div>
