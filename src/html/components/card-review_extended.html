<div
  class="{{className}} card-review"
  data-review-id="{{dataId}}">
    <div class="card-review__head">
        <picture class="card-review__photo">
            <img
              src=""
              alt=""
              loading="lazy"
              data-review-photo>
        </picture>
        <div class="card-review__about">
            <p
              class="card-review__name"
              data-review-name></p>
            <p
              class="card-review__date"
              data-review-date></p>
        </div>
        {{> components/rating
        className="card-review__rating"
        }}
    </div>
    <p
      class="card-review__text"
      data-review-text></p>
    <div class="card-review__gallery" data-review-gallery>
        <picture class="card-review__review-img">
            <img
              src="./src/image/image.png"
              alt=""
              loading="lazy"
              data-review-img>
        </picture>
        <picture class="card-review__review-img">
            <img
              src="./src/image/image.png"
              alt=""
              loading="lazy"
              data-review-img>
        </picture>
    </div>
    <hr class="card-review__line">
    <div class="card-review__foot">
        <div class="card-review__chose">
            <span class="card-review__chose-text">Size</span>
            <span class="card-review__chose-number">2 PACK</span>
        </div>
        <div class="card-review__verified">
            {{> components/svg
            className="hero-product__status-icon"
            id="check"
            }}
            <span class="hero-product__status-text">VERIFIED</span>
        </div>
    </div>
</div>
