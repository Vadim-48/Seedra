<div class="{{className}} news-card" data-sort-card>
    <div class="news-card__content">
        <div class="news-card__date-row">
            {{> components/svg
            className="news-card__icon"
            id="clock"
            }}
            <span class="news-card__date-text">{{date}}</span>
        </div>
        <h3 class="news-card__title sub-title" data-card-name>
            {{title}}
        </h3>
        <p class="news-card__text">
            {{text}}
        </p>
        <a
          href="{{href}}"
          class="news-card__btn btn_white">Read</a>
    </div>
    <picture class="{{classNamePicture}} news-card__photo">

        {{#if mobile}}
        <source srcset="{{desktopWebp}}" media="(min-width:769px)" type="image/webp">

        <source srcset="{{desktop}}" media="(min-width:769px)">

        <source srcset="{{mobileWebp}}" media="(max-width:768px)" type="image/webp">
        <source srcset="{{mobile}}" media="(max-width:768px)">
        {{else}}
        <source srcset="{{desktopWebp}}" type="image/webp">
        {{/if}}
        <img
          src="{{desktop}}"
          alt="{{alt}}"
          loading="lazy">
    </picture>
</div>
