<div class="share__wrap">
    <div class="share__content">
        <p class="share__text">
            Title was helpful?
        </p>
        <h2 class="share__title">Share with friends</h2>
    </div>
    <div class="share__social-row">
        <a href="{{> links/facebook}}" class="share__social-link">
            {{> components/svg
            className="share__social-icon"
            id="facebook"
            }}
        </a>
        <a href="{{> links/x}}" class="share__social-link">
            {{> components/svg
            className="share__social-icon"
            id="twitter"
            }}
        </a>
        <a href="{{>links/pinterest}}" class="share__social-link">
            {{> components/svg
            className="share__social-icon"
            id="pinterest"
            }}
        </a>
    </div>
</div>
