<div class="toolbar {{className}}">
    <form
      action="#"
      autocomplete="off"
      class="toolbar__search-form"
      data-search-form>
        <button class="toolbar__search-btn">
            {{> components/svg
            className="toolbar__search-icon"
            id="search"
            }}
        </button>
        <input
          type="search"
          name="search"
          class="toolbar__search-input"
          placeholder="Search">
        <button
          class="toolbar__filter-btn"
          type="button">
            {{> components/svg
            className="toolbar__filter-icon"
            id="filter"
            }}
        </button>
    </form>
    <button
      class="toolbar__sort-btn"
      type="button">
        <div class="toolbar__sort-inner">
            <span class="toolbar__sort-text">
                Sort by
            </span>
            <span class="toolbar__sort-item">
                Recently
            </span>
        </div>
        {{> components/svg
        className="toolbar__sort-icon"
        id="arrow-bottom"
        }}
    </button>
</div>
