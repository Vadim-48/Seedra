<div class="container">
    <div class="products-prev__head">
        <h2 class="products-prev__title title">Our products.</h2>
        <a href="{{>links/nav_all-products}}" class="products-prev__btn-all btn_white">
            <span class="products-prev__text">View all (<span class="products-prev__number">12</span>)</span>
        </a>
    </div>
    {{> components/menu-category
    className="products-prev__category"
    }}
</div>
<div class="products-prev__swiper-container container">
    <div class="products-prev__swiper swiper">
        <div class="products-prev__list swiper-wrapper" data-product-cards-wrap>
            <template class="products-prev__template" id="product-template">
                {{> components/card-product
                className="products-prev__card swiper-slide"
                hrefLink="./one-product.html"
                altImg="product Seedra"
                }}
            </template>
        </div>
    </div>
</div>
