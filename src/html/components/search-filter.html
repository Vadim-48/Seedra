<div class="search-filter__wrap">
    <form
      action="#"
      class="search-filter__search-form" data-search-form>
        <button class="search-filter__search-btn">
            {{> components/svg
                className="search-filter__search-icon"
                id="search"
            }}
        </button>
        <input
          type="search"
          class="search-filter__search-input"
          placeholder="Search">
        <button class="search-filter__filter-btn" type="button">
            {{> components/svg
            className="search-filter__filter-icon"
            id="filter"
            }}
        </button>
    </form>
    <button class="search-filter__sort-btn" type="button">
        <div class="search-filter__sort-inner">
            <span class="search-filter__sort-text">
                Sort by
            </span>
            <span class="search-filter__sort-item">
                Recently
            </span>
        </div>
        {{> components/svg
            className="search-filter__sort-icon"
            id="arrow-bottom"
        }}
    </button>
</div>
