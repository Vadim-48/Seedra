<div
  class="{{className}} card-review card-review_extended"
  data-review-id="{{dataId}}">
    <div class="card-review__content">
        <div class="card-review__head">
            <picture class="card-review__photo">
                <img
                  src=""
                  alt=""
                  loading="lazy"
                  data-review-photo>
            </picture>
            <div class="card-review__about">
                <p
                  class="card-review__name"
                  data-review-name></p>
                <p
                  class="card-review__date"
                  data-review-date-extended></p>
            </div>
            {{> components/rating
            className="card-review__rating"
            }}
        </div>
        <p
          class="card-review__text"
          data-review-text></p>
        <div
          class="card-review__gallery"
          data-review-gallery>
            <template class="card-review__gallery-template" data-template-gallery>
                <a
                  href=""
                  data-fancybox=""
                  class="card-review__link"
                  data-review-link>
                    <picture class="card-review__review-img">
                        <img
                          src=""
                          alt=""
                          loading="lazy"
                          data-review-img>
                    </picture>
                </a>
            </template>
        </div>
    </div>
    <div class="card-review__foot">
        <hr class="card-review__line">
        <div class="card-review__foot-inner">
            <div class="card-review__chose">
                <span class="card-review__chose-text">Size</span>
                <span
                  class="card-review__chose-number"
                  data-review-pack-size>0 PACK</span>
            </div>
            <div
              class="card-review__verified"
              data-review-verified>
                {{> components/svg
                className="hero-product__status-icon"
                id="check"
                }}
                <span class="hero-product__status-text">VERIFIED</span>
            </div>
        </div>
    </div>
</div>
