<form
  action="#"
  name="ask-form"
  data-cards-filer
  data-disabled
  method="POST"
  autocomplete="off"
  class="filter-form {{className}}">
    <div class="filter-form__arrow"></div>
    <h1 class="filter-form__title">FILTERS</h1>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group active"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Seed type </span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="seedType"
                  value="hybrid"><span>Hybrid</span></label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="seedType"
                  value="pollinated"><span>Open Pollinated</span></label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="seedType"
                  value="organic"><span>Organic Seeds, Plants, and
                    Supplies</span></label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="seedType"
                  value="pelleted"><span>Pelleted See</span></label>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Featured</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="featureType"
                  value="one"><span>One</span></label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="featureType"
                  value="two"><span>Two</span></label>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Growing Conditions</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="growingType"
                  value="fast"><span>Fast</span></label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="growingType"
                  value="slow"><span>slow</span></label>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Price</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <div class="filter-form__price-wrap">
                    <div class="filter-form__price">
                        <label class="filter-form__price-label">
                            <span class="filter-form__text_above">From</span>
                            <span class="filter-form__price-text">$</span>
                            <input
                              type="number"
                              min="1"
                              max="1000"
                              placeholder="1"
                              class="filter-form__price-input"
                              data-price-min></label>
                        <div class="filter-form__price-line"></div>
                        <label class="filter-form__price-label">
                            <span class="filter-form__text_above">To</span>
                            <span class="filter-form__price-text">$</span>
                            <input
                              type="number"
                              min="1"
                              max="1000"
                              placeholder="1000"
                              class="filter-form__price-input"
                              data-price-max></label>
                    </div>
                    <div
                      data-range-slider
                      class="filter-form__price-slider"></div>
                </div>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Use</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="useType"
                  value="warm"><span>Warm</span></label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="useType"
                  value="cold"><span>Cold</span></label>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Additional Characteristic</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="characteristicType"
                  value="one"><span>One</span></label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="characteristicType"
                  value="two"><span>Two</span></label>
            </div>
        </div>
    </fieldset>
</form>
