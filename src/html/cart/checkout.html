<div class="checkout__wrap">
    <div class="checkout__personal-info">
        {{> cart/step-header
        className="checkout__step-header"
        href="./cart.html"
        title="Checkout"
        }}
        <form
          action="#"
          name="checkout-form"
          id="checkout-form"
          method="POST"
          autocomplete="off"
          novalidate
          class="checkout__checkout-form checkout-form">
            <h2 class="checkout-form__title sub-title">Personal info</h2>
            <div class="checkout-form__group">
                <label
                  class="checkout-form__group-label">
                    Name
                    <input
                      type="text"
                      name="name"
                      placeholder="Your name"
                      class="checkout-form__group-input">
                    <span
                      data-text-error
                      class="checkout-form__text-error"></span>
                </label>
                <label
                  class="checkout-form__group-label">
                    Phone number
                    <input
                      type="tel"
                      name="phone"
                      inputmode="tel"
                      placeholder="Your number"
                      class="checkout-form__group-input">
                    <span
                      data-text-error
                      class="checkout-form__text-error"></span>
                </label>
            </div>
            <h2 class="checkout-form__title sub-title">Address</h2>
            <div class="checkout-form__group">
                <label
                  class="checkout-form__group-label">
                    State
                    <input
                      type="text"
                      name="state"
                      placeholder="Name of state"
                      class="checkout-form__group-input">
                    <span
                      data-text-error
                      class="checkout-form__text-error"></span>
                </label>
                <label
                  class="checkout-form__group-label">
                    City
                    <input
                      type="text"
                      name="city"
                      placeholder="Name of city"
                      class="checkout-form__group-input">
                    <span
                      data-text-error
                      class="checkout-form__text-error"></span>
                </label>
                <label
                  class="checkout-form__group-label">
                    Address
                    <input
                      type="text"
                      name="address"
                      placeholder="1901 Thornridge Cir. Shiloh, Hawaii 81063"
                      class="checkout-form__group-input">
                    <span
                      data-text-error
                      class="checkout-form__text-error"></span>
                </label>
                <label
                  class="checkout-form__group-label">
                    ZIP code
                    <input
                      type="text"
                      name="zip-code"
                      placeholder="ZIP code"
                      class="checkout-form__group-input">
                    <span
                      data-text-error
                      class="checkout-form__text-error"></span>
                </label>
            </div>
            <button
              type="submit"
              class="checkout-form__btn btn_green">Continue
            </button>
        </form>
    </div>
    <div class="checkout__info-cart info-cart">
        <h3 class="info-cart__title">Your cart</h3>
        <div class="info-cart__list">
            <template class="info-cart__list_template" id="list-item">
                <div class="info-cart__list-item">
                    <p class="info-cart__list-item-title">SEEDRA Corn - Bodacious
                        Hybrid Seeds for Indoor and Outdoor Planting</p>
                    <p class="info-cart__list-item-price">$0</p>
                </div>
            </template>
        </div>
        <div class="info-cart__total">
            <span class="info-cart__total-label">Total amount</span>
            <span class="info-cart__total-value" data-final-price>$0</span>
        </div>
    </div>
</div>
