<form
  action="#"
  class="filter-form {{className}}">
    <h1 class="filter-form__title">FILTERS</h1>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group active"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Seed type </span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="seedType"
                  value="hybrid">Hybrid</label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="seedType"
                  value="pollinated">Open Pollinated</label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="seedType"
                  value="organic">Organic Seeds, Plants, and
                    Supplies</label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="seedType"
                  value="pelleted">Pelleted See</label>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Featured</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="featureType"
                  value="one">One</label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="featureType"
                  value="two">Two</label>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Growing Conditions</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="growingType"
                  value="fast">Fast</label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="growingType"
                  value="slow">slow</label>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Price</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <div class="filter-form__price-wrap">
                    <div class="filter-form__price">
                        <label class="filter-form__price-label">
                            <span class="filter-form__text_above">From</span>
                            <span class="filter-form__price-text">$</span>
                            <input
                              type="number"
                              min="1"
                              max="1000"
                              placeholder="1"
                              class="filter-form__price-input"
                              id="price-min"></label>
                        <div class="filter-form__price-line"></div>
                        <label class="filter-form__price-label">
                            <span class="filter-form__text_above">To</span>
                            <span class="filter-form__price-text">$</span>
                            <input
                              type="number"
                              min="1"
                              max="1000"
                              placeholder="1000"
                              class="filter-form__price-input"
                              id="price-max"></label>
                    </div>
                    <div
                      id="range-slider"
                      class="filter-form__price-slider"></div>
                </div>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Use</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="useType"
                  value="warm">Warm</label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="useType"
                  value="cold">Cold</label>
            </div>
        </div>
    </fieldset>
    <hr class="filter-form__line">
    <fieldset
      class="filter-form__group"
      data-accordion>
        <button
          class="filter-form__group-btn"
          type="button">
            <span class="filter-form__group-title">Additional Characteristic</span>
            {{> components/svg
            className="filter-form__group-arrow"
            id="arrow-bottom"
            }}
        </button>
        <div class="filter-form__group-body-wrap">
            <div class="filter-form__group-body">
                <hr class="filter-form__group-line">
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="characteristicType"
                  value="one">One</label>
                <label class="filter-form__checkbox-label"><input
                  type="checkbox"
                  class="filter-form__checkbox-input"
                  name="characteristicType"
                  value="two">Two</label>
            </div>
        </div>
    </fieldset>
</form>
