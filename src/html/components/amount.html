<div class="{{className}} amount__number">
    <button class="amount__number-remove">
        {{> components/svg
        className="amount__number-icon"
        id="minus"
        }}
    </button>
    <div class="amount__number-inner">
        <span class="amount__number-item">2</span>
    </div>
    <button class="amount__number-add">
        {{> components/svg
        className="amount__number-icon"
        id="plus"
        }}
    </button>
</div>
